version: "3.9"

services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  qdrant:
    image: qdrant/qdrant
    container_name: agentica-qdrant
    ports:
      - "6333:6333"
    environment:
      QDRANT__TELEMETRY_DISABLED: "true"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - agentica-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # redis:
  #   image: redis:7-alpine
  #   container_name: agentica-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - agentica-network
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  # rabbitmq:
  #   image: rabbitmq:3-management-alpine
  #   container_name: agentica-rabbitmq
  #   ports:
  #     - "5672:5672"
  #     - "15672:15672"   # management UI
  #   environment:
  #     RABBITMQ_DEFAULT_USER: guest
  #     RABBITMQ_DEFAULT_PASS: guest
  #   volumes:
  #     - rabbitmq_data:/var/lib/rabbitmq
  #   networks:
  #     - agentica-network
  #   healthcheck:
  #     test: ["CMD", "rabbitmq-diagnostics", "ping"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  ollama:
    image: ollama/ollama
    container_name: agentica-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - agentica-network
    # CPU only — no GPU section needed for Intel UHD 620
    # ── GPU alternative (nvidia) ───────────────────────────────────────────
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    # ──────────────────────────────────────────────────────────────────────

  # ── Services ─────────────────────────────────────────────────────────────────

  rag-service:
    build:
      context: ./services/rag-service
      dockerfile: Dockerfile
    container_name: agentica-rag-service
    ports:
      - "8001:8001"
    environment:
      APP_ENV: development
      APP_PORT: 8001
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: agentica
      EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
      EMBEDDING_DEVICE: cpu
      CHUNK_SIZE: 512
      CHUNK_OVERLAP: 50
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      LLM_SERVICE_URL: http://llm-service:8002
      LOG_LEVEL: INFO
    depends_on:
      - qdrant
      # rabbitmq:
      #   condition: service_healthy
    networks:
      - agentica-network
    volumes:
      - ./services/rag-service:/app
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  llm-service:
    build:
      context: ./services/llm-service
      dockerfile: Dockerfile
    container_name: agentica-llm-service
    ports:
      - "8002:8002"
    environment:
      APP_ENV: development
      APP_PORT: 8002
      OLLAMA_HOST: ollama
      OLLAMA_PORT: 11434
      OLLAMA_MODEL: llama3.2:3b
      OLLAMA_TIMEOUT: 120
      MAX_TOKENS: 1024
      TEMPERATURE: 0.7
      TOP_P: 0.9
      STREAM: "true"
      RAG_SERVICE_URL: http://rag-service:8001
      LOG_LEVEL: INFO
    depends_on:
      - ollama
    networks:
      - agentica-network
    volumes:
      - ./services/llm-service:/app
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

# ── Volumes ───────────────────────────────────────────────────────────────────

volumes:
  qdrant_data:
  # redis_data:
  # rabbitmq_data:
  ollama_data:

# ── Networks ──────────────────────────────────────────────────────────────────

networks:
  agentica-network:
    driver: bridge