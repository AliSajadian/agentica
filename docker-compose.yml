version: "3.9"

services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: agentica-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: agentica_memory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agentica-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentica_memory"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  qdrant:
    image: qdrant/qdrant
    container_name: agentica-qdrant
    ports:
      - "6333:6333"
    environment:
      QDRANT__TELEMETRY_DISABLED: "true"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - agentica-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: agentica-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agentica-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # rabbitmq:
  #   image: rabbitmq:3-management-alpine
  #   container_name: agentica-rabbitmq
  #   ports:
  #     - "5672:5672"
  #     - "15672:15672"   # management UI
  #   environment:
  #     RABBITMQ_DEFAULT_USER: guest
  #     RABBITMQ_DEFAULT_PASS: guest
  #   volumes:
  #     - rabbitmq_data:/var/lib/rabbitmq
  #   networks:
  #     - agentica-network
  #   healthcheck:
  #     test: ["CMD", "rabbitmq-diagnostics", "ping"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  ollama:
    image: ollama/ollama
    container_name: agentica-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - agentica-network
    # CPU only — no GPU section needed for Intel UHD 620
    # ── GPU alternative (nvidia) ───────────────────────────────────────────
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    # ──────────────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus
    container_name: agentica-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - agentica-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: agentica-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: agentica
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - agentica-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    
  # ── Services ─────────────────────────────────────────────────────────────────

  rag-service:
    build:
      context: ./services/core/rag-service
      dockerfile: Dockerfile
    container_name: agentica-rag-service
    ports:
      - "8001:8001"
    environment:
      APP_ENV: development
      APP_PORT: 8001
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: agentica
      EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
      EMBEDDING_DEVICE: cpu
      CHUNK_SIZE: 512
      CHUNK_OVERLAP: 50
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      LLM_SERVICE_URL: http://llm-service:8002
      LOG_LEVEL: INFO
    depends_on:
      - qdrant
      # rabbitmq:
      #   condition: service_healthy
    networks:
      - agentica-network
    volumes:
      - ./services/core/rag-service:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  llm-service:
    build:
      context: ./services/core/llm-service
      dockerfile: Dockerfile
    container_name: agentica-llm-service
    ports:
      - "8002:8002"
    environment:
      APP_ENV: development
      APP_PORT: 8002
      OLLAMA_HOST: ollama
      OLLAMA_PORT: 11434
      OLLAMA_MODEL: llama3.2:3b
      OLLAMA_TIMEOUT: 120
      MAX_TOKENS: 1024
      TEMPERATURE: 0.7
      TOP_P: 0.9
      STREAM: "true"
      RAG_SERVICE_URL: http://rag-service:8001
      LOG_LEVEL: INFO
    depends_on:
      - ollama
    networks:
      - agentica-network
    volumes:
      - ./services/core/llm-service:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  memory-service:
    build:
      context: ./services/core/memory-service
      dockerfile: Dockerfile
    container_name: agentica-memory-service
    ports:
      - "8003:8003"
    environment:
      APP_ENV: development
      APP_PORT: 8003
      DATABASE_URL: postgresql+asyncpg://postgres:admin@postgres:5432/agentica_memory
      REDIS_URL: redis://redis:6379/0      
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agentica-network
    volumes:
      - ./services/core/memory-service:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  agent-service:
    build:
      context: ./services/core/agent-service
      dockerfile: Dockerfile
    container_name: agentica-agent-service
    ports:
      - "8004:8004"
    environment:
      APP_ENV: development
      APP_PORT: 8004
      LOG_LEVEL: INFO
      RAG_SERVICE_URL: http://rag-service:8001
      LLM_SERVICE_URL: http://llm-service:8002
      MEMORY_SERVICE_URL: http://memory-service:8003
      HTTP_TIMEOUT: 30
      HTTP_MAX_RETRIES: 3
    depends_on:
      - rag-service
      - llm-service
      - memory-service
    networks:
      - agentica-network
    volumes:
      - ./services/core/agent-service:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8004/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  gateway-service:
    build:
      context: ./services/core/gateway-service
      dockerfile: Dockerfile
    container_name: agentica-gateway-service
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      APP_PORT: 8000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: agentica_gateway
      DATABASE_URL: postgresql+asyncpg://postgres:admin@postgres:5432/agentica_gateway
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 1
      JWT_SECRET_KEY: your-super-secret-key-change-in-production
      RAG_SERVICE_URL: http://rag-service:8001
      LLM_SERVICE_URL: http://llm-service:8002
      MEMORY_SERVICE_URL: http://memory-service:8003
      AGENT_SERVICE_URL: http://agent-service:8004
      LOG_LEVEL: INFO
    depends_on:
      - postgres
      - redis
      - rag-service
      - llm-service
      - memory-service
    networks:
      - agentica-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ── Agents ─────────────────────────────────────────────────────────────────

  weather-agent:
    build:
      context: ./services/agents/weather-agent
      dockerfile: Dockerfile
    container_name: agentica-weather-agent
    ports:
      - "8011:8011"
    environment:
      APP_ENV: development
      APP_PORT: 8011
      OPENWEATHER_API_KEY: abcd
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 2
      LOG_LEVEL: INFO
    depends_on:
      - redis
    networks:
      - agentica-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8011/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  search-agent:
    build:
      context: ./services/agents/search-agent
      dockerfile: Dockerfile
    container_name: agentica-search-agent
    ports:
      - "8012:8012"
    environment:
      APP_ENV: development
      APP_PORT: 8012
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 3
      LOG_LEVEL: INFO
    depends_on:
      - redis
    networks:
      - agentica-network
    volumes:
    - ./services/agents/search-agent/secrets:/home/ali/projects/AI/agentica/services/agents/search-agent/secrets
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8012/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped


# ── Volumes ───────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  # rabbitmq_data:
  ollama_data:
  prometheus_data:
  grafana_data:

# ── Networks ──────────────────────────────────────────────────────────────────

networks:
  agentica-network:
    driver: bridge