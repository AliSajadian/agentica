global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: "rag-service"
    static_configs:
      - targets: ["rag-service:8001"]

  - job_name: "llm-service"
    static_configs:
      - targets: ["llm-service:8002"]

  - job_name: "memory-service"
    static_configs:
      - targets: ["memory-service:8003"]

  - job_name: "agent-service"
    static_configs:
      - targets: ["memory-service:8004"]

  - job_name: "gateway-service"
    static_configs:
      - targets: ["gateway-service:8000"]

  - job_name: "weather-agent"
    static_configs:
      - targets: ["weather-agent:8011"]

  - job_name: "search-agent"
    static_configs:
      - targets: ["search-agent:8012"]
