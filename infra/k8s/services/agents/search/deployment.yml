
# Search Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service-deploy
  namespace: agentica-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      volumes:
        - name: secrets
          hostPath:
            path: /home/ali/projects/AI/agentica/services/agents/search-agent/secrets
            type: Directory
      containers:
        - name: search-service
          image: agentica-search-service:latest # Replace with your image
          imagePullPolicy: Never
          ports:
            - name: http-api
              containerPort: 8012 # Your FastAPI HTTP port
            # - name: grpc-api
            #   containerPort: 50052 # Your gRPC port
          env:
            - name: APP_PORT
              value: "8012"
            - name: DUCKDUCKGO_BASE_URL
              value: "https://api.duckduckgo.com"
            - name: REDIS_HOST
              value: "redis-memory-svc.agentica-app.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "0"
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          volumeMounts:
            - name: secrets
              mountPath: /home/ali/projects/AI/agentica/services/agents/search-agent/secrets
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: http-api
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: http-api
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
