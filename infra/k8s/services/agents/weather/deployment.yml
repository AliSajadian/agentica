
# Weather Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-service-deploy
  namespace: agentica-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-service
  template:
    metadata:
      labels:
        app: weather-service
    spec:
      containers:
        - name: weather-service
          image: agentica-weather-service:latest # Replace with your image
          imagePullPolicy: Never
          ports:
            - name: http-api
              containerPort: 8011 # Your FastAPI HTTP port
            # - name: grpc-api
            #   containerPort: 50052 # Your gRPC port
          env:
            - name: OPENWEATHER_API_KEY
              value: "bc3fd8b7cbc771df346c6a812905fb7d"
            - name: OPENWEATHER_BASE_URL
              value: "https://api.openweathermap.org/data/2.5"
            - name: OPENWEATHER_UNITS
              value: "metric"
            - name: OPENWEATHER_LANG
              value: "en"
            - name: APP_PORT
              value: "8011"
            - name: REDIS_HOST
              value: "redis-memory-svc.agentica-app.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "0"              
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: http-api
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: http-api
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
