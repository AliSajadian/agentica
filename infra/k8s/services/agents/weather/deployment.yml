
# Weather Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-service-deploy
  namespace: agentica-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-service
  template:
    metadata:
      labels:
        app: weather-service
    spec:
      containers:
        - name: weather-service
          image: agentica-weather-service:latest # Replace with your image
          imagePullPolicy: Never
          ports:
            - name: http-api
              containerPort: 8011 # Your FastAPI HTTP port
            # - name: grpc-api
            #   containerPort: 50052 # Your gRPC port
          env:
            - name: APP_PORT
              value: "8011"
            - name: REDIS_HOST
              value: "redis-memory-svc"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "0"              
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: http-api
            initialDelaySeconds: 10
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: http-api
            initialDelaySeconds: 15
            periodSeconds: 5