# Service for Rag Service (HTTP & gRPC)
apiVersion: v1
kind: Service
metadata:
  name: rag-service-svc
  namespace: agentica-app
spec:
  selector:
    app: rag-service
  ports:
    - name: http-api
      protocol: TCP
      port: 8001 # Internal service port for HTTP
      targetPort: 8001 # Container's HTTP port
    # - name: grpc-api
    #   protocol: TCP
    #   port: 50052
    #   targetPort: 50052
  type: ClusterIP