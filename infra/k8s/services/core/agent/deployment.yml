
# Agent Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service-deploy
  namespace: agentica-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-service
  template:
    metadata:
      labels:
        app: agent-service
    spec:
      containers:
        - name: agent-service
          image: agentica-agent-service:latest # Replace with your image
          imagePullPolicy: IfNotPresent
          ports:
            - name: http-api
              containerPort: 8004 # Your FastAPI HTTP port
            # - name: grpc-api
            #   containerPort: 50052 # Your gRPC port
          env:
            - name: APP_PORT
              value: "8004"
            - name: RAG_SERVICE_URL
              value: http://rag-service-svc:8001
            - name: LLM_SERVICE_URL
              value: http://llm-service-svc:8002
            - name: MEMORY_SERVICE_URL 
              value: http://memory-service-svc:8003
            - name: HTTP_TIMEOUT 
              value: "30"
            - name: HTTP_MAX_RETRIES
              value: "3"
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: http-api
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: http-api
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 5
            timeoutSeconds: 10
