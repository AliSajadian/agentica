
# LLM Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-service-deploy
  namespace: agentica-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-service
  template:
    metadata:
      labels:
        app: llm-service
    spec:
      containers:
        - name: llm-service
          image: agentica-llm-service:latest # Replace with your image
          imagePullPolicy: Never
          ports:
            - name: http-api
              containerPort: 8002 # Your FastAPI HTTP port
            # - name: grpc-api
            #   containerPort: 50052 # Your gRPC port
          env:
            - name: APP_PORT
              value: "8002"
            - name: OLLAMA_HOST
              value: ollama-svc
            - name: OLLAMA_PORT
              value: "11434"
            - name: OLLAMA_MODEL
              value: "llama3.2:3b"
            - name: OLLAMA_TIMEOUT
              value: "120"
            - name: MAX_TOKENS
              value: "1024"
            - name: EMPERATURE
              value: "0.7"
            - name: OP_P
              value: "0.9"
            - name: STREAM
              value: "true"
            - name: RAG_SERVICE_URL
              value: http://rag-service:8001
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: http-api
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: http-api
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
