# For Memory Service PostgreSQL
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-memory-pvc
  namespace: agentica-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 200Mi
  storageClassName: standard

