# Public Service for Ollama (for internal or external access)
apiVersion: v1
kind: Service
metadata:
  name: ollama-public-svc
  namespace: agentica-app
spec:
  selector:
    app: ollama
  ports:
    - name: http
      protocol: TCP
      port: 11434
      targetPort: 11434
  type: ClusterIP  # Or NodePort/LoadBalancer if external access is needed
