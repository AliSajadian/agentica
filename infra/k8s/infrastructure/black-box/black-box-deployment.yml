# Blackbox Exporter Deployment (stateless)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blackbox-deploy
  namespace: agentica-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blackbox
  template:
    metadata:
      labels:
        app: blackbox
    spec:
      containers:
        - name: blackbox
          image: prom/blackbox-exporter:latest
          args:
            - "--config.file=/etc/blackbox_exporter/config.yml"
          ports:
            - containerPort: 9115
          volumeMounts:
            - name: blackbox-config
              mountPath: /etc/blackbox_exporter
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: blackbox-config
          configMap:
            name: app-config  # Reference your central ConfigMap
