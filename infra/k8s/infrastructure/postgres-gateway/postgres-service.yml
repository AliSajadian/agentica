# Service for Memory Service PostgreSQL
apiVersion: v1
kind: Service
metadata:
  name: postgresql-gateway-svc
  namespace: agentica-app
spec:
  selector:
    app: postgres-gateway # Matches the StatefulSet's labels
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  clusterIP: None # Headless service for StatefulSet
